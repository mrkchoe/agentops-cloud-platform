services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentops_cloud
    ports:
      - "5432:5432"
    volumes:
      - agentops_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - agentops_redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SEED_DEMO: ${SEED_DEMO}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  celery-worker:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SEED_DEMO: "0"
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_API_AUTH_TOKEN: ${NEXT_PUBLIC_API_AUTH_TOKEN}
      NEXT_PUBLIC_USER_ID: ${NEXT_PUBLIC_USER_ID}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  agentops_pg_data:
  agentops_redis_data:

